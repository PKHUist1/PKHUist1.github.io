<!DOCTYPE html>
<html>
<head>
    <title>Peter Kowalski - Microsoft Fabric Portfolio</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fa;
            margin: 40px;
        }

        h1 {
            text-align: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .tile {
            background: white;
            border-radius: 10px;
            padding: 20px;
            text-decoration: none;
            color: black;
            box-shadow: 0 2px 10px rgba(0,0,0,.1);
            transition: transform .2s;
        }

        .tile:hover {
            transform: translateY(-5px);
        }

        .tech {
            color: #666;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<h1>Microsoft Fabric Portfolio</h1>

<p style="text-align:center">
Senior Data Engineer | Fabric Architect | Power BI
</p>

<div class="grid">

<a class="tile" href="#">
    <h2>Customer Analytics Platform</h2>
    <div class="tech">
        Lakehouse • Data Factory • Power BI
    </div>
</a>

<a class="tile" href="#">
    <h2>Executive KPI Dashboard</h2>
    <div class="tech">
        Warehouse • Semantic Model • Power BI
    </div>
</a>

<a class="tile" href="#">
    <h2>Sales Forecasting Solution</h2>
    <div class="tech">
        Notebooks • Lakehouse • ML
    </div>
</a>

</div>

</body>
</html>
